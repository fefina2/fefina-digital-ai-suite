<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEFINA DIGITAL AI SUITE V2</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
color:#FFD700;
}

.card{
background:#1a1a1a;
border:1px solid #FFD700;
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:12px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#FFD700;
border:none;
border-radius:8px;
font-weight:bold;
font-size:18px;
cursor:pointer;
}

.output{
background:#111;
border:1px solid #444;
padding:12px;
border-radius:8px;
white-space:pre-wrap;
min-height:80px;
}

h2{
color:#FFD700;
}
</style>
</head>

<body>

<div class="container">

<h1>FEFINA DIGITAL AI SUITE</h1>

<div class="card">

<label>Gemini API Key</label>
<input type="password" id="apiKey">

<label>Topik Konten</label>
<input type="text" id="topic" placeholder="Contoh: Kenapa Lagu Bisa Nyangkut di Kepala?">

<label>Kategori</label>
<select id="category">
<option>Fakta Unik</option>
<option>Golongan Darah</option>
<option>Psikologi</option>
<option>Kesehatan</option>
<option>AI</option>
<option>Teknologi</option>
<option>Custom</option>
</select>

<label>Bahasa</label>
<select id="language">
<option>Indonesia</option>
<option>English</option>
</select>

<label>Jumlah Scene</label>
<select id="sceneCount">
<option>3</option>
<option selected>5</option>
<option>7</option>
<option>10</option>
</select>

<button onclick="generateContent()">
GENERATE CONTENT
</button>

</div>

<div class="card">
<h2>Judul Viral</h2>
<div id="titles" class="output"></div>
</div>

<div class="card">
<h2>Hook 3 Detik</h2>
<div id="hook" class="output"></div>
</div>

<div class="card">
<h2>Storyboard</h2>
<div id="storyboard" class="output"></div>
</div>

<div class="card">
<h2>Prompt Thumbnail</h2>
<div id="thumbnail" class="output"></div>
</div>

<div class="card">
<h2>Caption</h2>
<div id="caption" class="output"></div>
</div>

<div class="card">
<h2>Hashtag</h2>
<div id="hashtag" class="output"></div>
</div>

</div>

<script>

async function generateContent(){

const apiKey=document.getElementById("apiKey").value;
const topic=document.getElementById("topic").value;
const category=document.getElementById("category").value;
const language=document.getElementById("language").value;
const scenes=document.getElementById("sceneCount").value;

const prompt=`
Buat konten viral.

Topik: ${topic}
Kategori: ${category}
Bahasa: ${language}
Jumlah Scene: ${scenes}

Format hasil:

JUDUL VIRAL:
10 judul

HOOK:
1 hook brutal 3 detik

STORYBOARD:
Scene 1 sampai Scene ${scenes}
berisi narasi, prompt gambar dan prompt video.

THUMBNAIL:
1 prompt thumbnail

CAPTION:
1 caption viral

HASHTAG:
hashtag viral
`;

try{

const response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:prompt
}
]
}
]
})
}
);

const data=await response.json();

const result=data.candidates[0].content.parts[0].text;

document.getElementById("titles").innerText=result;
document.getElementById("hook").innerText=result;
document.getElementById("storyboard").innerText=result;
document.getElementById("thumbnail").innerText=result;
document.getElementById("caption").innerText=result;
document.getElementById("hashtag").innerText=result;

}
catch(error){
alert("Error : "+error);
}

}

</script>

</body>
</html>
